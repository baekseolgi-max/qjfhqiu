<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 추첨기</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #122846;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f5f7fb;
      --muted: #b8c4d9;
      --accent: #6ee7ff;
      --accent-2: #8b5cf6;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(110, 231, 255, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.22), transparent 28%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      padding: 28px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 700;
    }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3.1rem); line-height: 1.05; }
    .desc { margin: 14px 0 24px; color: var(--muted); line-height: 1.6; }
    .controls { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end; }
    label { display: block; margin-bottom: 8px; font-size: 0.95rem; color: var(--muted); }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(8, 16, 30, 0.7);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: rgba(110, 231, 255, 0.7); box-shadow: 0 0 0 4px rgba(110, 231, 255, 0.12); }
    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .primary {
      color: #04111f;
      background: linear-gradient(135deg, var(--accent), #c7f9ff);
      box-shadow: 0 14px 28px rgba(110, 231, 255, 0.18);
    }
    .secondary { color: var(--text); background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); }
    .result { margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
    .ticket { display: grid; gap: 12px; margin-top: 16px; }
    .ticket-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: pop 0.35s ease both;
    }
    .ticket-label { min-width: 84px; color: var(--muted); font-size: 0.95rem; }
    .balls { display: flex; flex-wrap: wrap; gap: 8px; }
    .ball {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #06121f;
      background: linear-gradient(135deg, #fff, #b8f4ff);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }
    .meta { margin-top: 12px; color: var(--muted); font-size: 0.92rem; }
    .history {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .history-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      line-height: 1.5;
    }
    .shake { animation: shake 0.35s ease; }
    @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 50% { transform: translateX(3px); } 75% { transform: translateX(-2px); } }
    @media (max-width: 640px) {
      .card { padding: 20px; border-radius: 22px; }
      .controls { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <p class="eyebrow">Lucky Draw</p>
    <h1>로또 추첨기</h1>
    <p class="desc">원하는 티켓 수를 입력하고 추첨을 누르면 1부터 45까지의 번호 중 6개를 무작위로 뽑아드립니다.</p>
    <div class="controls">
      <div>
        <label for="tickets">생성할 티켓 수</label>
        <input id="tickets" type="number" value="1" min="1" max="10" />
      </div>
      <button id="generate" class="primary">추첨하기</button>
      <button id="copy" class="secondary" type="button">복사</button>
    </div>
    <div class="result" id="result">
      <div class="meta">아직 추첨 전입니다. 버튼을 눌러 번호를 뽑아보세요.</div>
    </div>
    <div class="meta" style="margin-top: 22px;">최근 저장된 추첨 기록</div>
    <div class="history" id="history">
      <div class="history-item">불러오는 중...</div>
    </div>
  </div>
  <script>
    function generateLottoNumbers() {
      const numbers = [];
      while (numbers.length < 6) {
        const next = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(next)) numbers.push(next);
      }
      return numbers.sort((a, b) => a - b);
    }
    const button = document.getElementById("generate");
    const copyButton = document.getElementById("copy");
    const ticketsInput = document.getElementById("tickets");
    const result = document.getElementById("result");
    const history = document.getElementById("history");
    const card = document.getElementById("card");
    let lastText = "";
    let lastPayload = null;
    function renderTickets(count) {
      const rows = [];
      for (let i = 1; i <= count; i += 1) {
        const numbers = generateLottoNumbers();
        rows.push(`
          <div class="ticket-row">
            <div class="ticket-label">티켓 ${i}</div>
            <div class="balls">
              ${numbers.map((n) => `<span class="ball">${String(n).padStart(2, "0")}</span>`).join("")}
            </div>
          </div>
        `);
      }
      lastText = rows.map((row, idx) => {
        const numbers = row.match(/\d{2}/g) || [];
        return `티켓 ${idx + 1}: ${numbers.join(" ")}`;
      }).join("\n");
      lastPayload = { count, tickets };
      result.innerHTML = `
        <div class="meta">총 ${count}개의 티켓을 추첨했습니다.</div>
        <div class="ticket">${rows.join("")}</div>
      `;
    }

    async function loadHistory() {
      try {
        const response = await fetch("/api/draws");
        if (!response.ok) {
          throw new Error("failed");
        }

        const data = await response.json();
        const items = Array.isArray(data.draws) ? data.draws : [];
        if (items.length === 0) {
          history.innerHTML = '<div class="history-item">아직 저장된 기록이 없습니다.</div>';
          return;
        }

        history.innerHTML = items.map((draw) => {
          const time = new Date(draw.created_at).toLocaleString("ko-KR");
          const lines = (draw.tickets || [])
            .map((ticket, idx) => `티켓 ${idx + 1}: ${ticket.map((n) => String(n).padStart(2, "0")).join(" ")}`)
            .join("<br />");
          return `
            <div class="history-item">
              <strong>${time}</strong><br />
              ${lines}
            </div>
          `;
        }).join("");
      } catch {
        history.innerHTML = '<div class="history-item">기록을 불러오지 못했습니다.</div>';
      }
    }

    button.addEventListener("click", async () => {
      const count = Math.max(1, Math.min(10, Number(ticketsInput.value) || 1));
      card.classList.remove("shake");
      void card.offsetWidth;
      card.classList.add("shake");
      renderTickets(count);

      if (!lastPayload) {
        return;
      }

      try {
        const response = await fetch("/api/draws", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastPayload),
        });

        if (!response.ok) {
          throw new Error("save failed");
        }

        await loadHistory();
      } catch {
        result.insertAdjacentHTML(
          "beforeend",
          '<div class="meta">저장에 실패했어요. Vercel 환경변수와 Supabase 연결을 확인해 주세요.</div>'
        );
      }
    });
    copyButton.addEventListener("click", async () => {
      if (!lastText) return;
      try {
        await navigator.clipboard.writeText(lastText);
        copyButton.textContent = "복사됨";
        setTimeout(() => { copyButton.textContent = "복사"; }, 1200);
      } catch {
        copyButton.textContent = "실패";
        setTimeout(() => { copyButton.textContent = "복사"; }, 1200);
      }
    });

    loadHistory();
  </script>
</body>
</html>
